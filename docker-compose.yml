services:
  vlm-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vlm-offline-api
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=Qwen/Qwen2.5-VL-7B-Instruct
      - MAX_NEW_TOKENS=256
      - MAX_VIDEO_FRAMES=8
      - VIDEO_FPS=1.0
      - HF_HOME=/root/.cache/huggingface
    volumes:
      # Bind mount: host directory survives 'docker-compose down', 'docker volume prune',
      # and all Docker housekeeping. Safe to back up or inspect directly.
      # Created automatically by Docker Compose if it doesn't exist.
      - ./.cache/huggingface:/root/.cache/huggingface
    restart: unless-stopped

  vlm-api-gpu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vlm-offline-api-gpu
    profiles: ["gpu"]
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=Qwen/Qwen2.5-VL-7B-Instruct
      - MAX_NEW_TOKENS=256
      - MAX_VIDEO_FRAMES=8
      - VIDEO_FPS=1.0
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - ./.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
